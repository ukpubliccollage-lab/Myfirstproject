# Netlify Configuration
# Deploy your DigitalGrow website on Netlify

[build]
  # No build command needed - static site
  command = ""
  # Publish directory - all files in root
  publish = "."

# Redirect all requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection
    X-XSS-Protection = "1; mode=block"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com"
    # Allow all origins for cross-origin requests
    Access-Control-Allow-Origin = "*"

# Cache static assets for 1 year
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML for 1 hour
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache JSON for 5 minutes
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Compression
[build.environment]
  NODE_ENV = "production"

# Custom domain setup
# Uncomment and update with your domain
# [dev]
#   command = "python -m http.server 8000"
#   port = 8000
#   publish = "."

# Functions directory (if you add serverless functions later)
# [functions]
#   directory = "functions"

# Forms submission handling (if using Netlify Forms)
# You can add form inputs with netlify attribute in HTML
# <form name="contact" method="POST" netlify></form>
